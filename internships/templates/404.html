{% extends 'internships/base.html' %}

{% block title %}404 - Page Not Found{% endblock %}

{% block content %}
<div style="text-align: center; padding: 10rem 1rem;">
    <h1 style="font-size: 6rem; color: var(--primary); margin-bottom: 1rem;">404</h1>
    <h2 style="margin-bottom: 1.5rem;">Oops! Page Not Found</h2>
    <p style="color: var(--text-muted); margin-bottom: 2.5rem; max-width: 500px; margin-left: auto; margin-right: auto;">
        The page you are looking for might have been removed, had its name changed, or is temporarily unavailable.
    </p>
    <a href="{% url 'home' %}" class="btn btn-primary" style="padding: 1rem 3rem;">Go Home</a>
</div>
{% endblock %}
